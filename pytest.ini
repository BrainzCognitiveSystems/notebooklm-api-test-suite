[pytest]
# ─── test discovery ──────────────────────────────────────────────────────────
testpaths = tests

# ─── asyncio ─────────────────────────────────────────────────────────────────
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# ─── per-test default timeout (seconds) ──────────────────────────────────────
# Individual tests can override with @pytest.mark.timeout(N).
# "Fast" assertions + API round-trips should finish in 60 s;
# generation + download tests are given 600 s via the marker.
timeout = 90

# ─── output ─────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ─── custom markers ──────────────────────────────────────────────────────────
markers =
    asyncio: mark a test as asynchronous (handled by pytest-asyncio)
    timeout: override the default per-test wall-clock timeout
    slow: mark tests that wait for artifact generation to complete (>60 s)

# ─── custom CLI options (defined in tests/conftest.py) ───────────────────────
# --keep-notebooks   Do not delete temp notebooks after tests; print their URLs
#                    so you can inspect results in the NotebookLM UI.
#
# Usage:
#   pytest --keep-notebooks                   # preserve ALL temp notebooks
#   pytest -k test_generate_audio_starts --keep-notebooks   # single test
